<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .title img {
        width: 24px;
        height: 24px;
      }

      .title h1 {
        margin: 0;
      }

      p {
        margin: 0 0 12px;
        color: #6b7280;
        line-height: 1.4;
      }

      button,
      a {
        box-sizing: border-box;
        display: block;
        width: 100%;
        border-radius: 8px;
        padding: 9px 10px;
        font-weight: 650;
        text-align: center;
        text-decoration: none;
      }

      [hidden] {
        display: none !important;
      }

      button {
        border: 0;
        color: white;
        background: #059669;
        cursor: pointer;
      }

      button.secondary,
      a {
        margin-top: 8px;
        color: #047857;
        border: 1px solid #d1fae5;
        background: #ecfdf5;
      }

      #status {
        min-height: 18px;
        margin-bottom: 10px;
        font-size: 12px;
        color: #6b7280;
      }

      #fallback {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="title">
      <img src="icons/icon48.png" alt="" />
      <h1>Save to AceJob</h1>
    </div>
    <p>Save this job page to your AceJob wishlist.</p>
    <div id="status"></div>
    <button id="connect">Connect AceJob</button>
    <button id="save" hidden>Save to AceJob</button>
    <button id="applied" hidden>Move to Applied</button>
    <div id="fallback" hidden>
      <button id="copy" class="secondary">Copy job text</button>
      <a href="https://aceyourjobhunt.tech" target="_blank" rel="noreferrer">Open AceJob</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
